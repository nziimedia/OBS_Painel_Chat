<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PAINEL NAZARÉ COMPACTO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
    :root { --gold: #c9a84c; --deep: #0d0d18; --panel: #13131f; --text: #e8e0d0; --border: rgba(201,168,76,0.2); }
    body { background: var(--deep); color: var(--text); font-family: sans-serif; font-size: 11px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { background: var(--panel); padding: 5px; border-bottom: 1px solid var(--border); display: flex; gap: 4px; align-items: center; }
    .btn { padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; background: var(--gold); color: #000; font-weight: bold; }
    .pane { display: none; flex: 1; overflow: hidden; }
    .pane.active { display: flex; flex-direction: column; }
    
    /* Layout compacto */
    .chat-msg { border-bottom: 1px solid #222; padding: 4px; }
    .msg-author { font-weight: bold; color: var(--gold); display: block; font-size: 10px; }
    
    /* Telão Estilo */
    .telao-card { background: #000; color: #fff; padding: 20px; font-family: serif; }
    .telao-title { font-size: 32px; color: var(--gold); text-align: center; }
    .telao-sub { font-size: 24px; color: #aaa; text-align: center; }
    .prayer-item { font-size: 20px; padding: 10px; border-bottom: 1px solid #333; }
</style>
</head>
<body>

<div class="topbar">
    <button class="btn" onclick="openLives()">🔍 Buscar e Conectar</button>
    <button class="btn" onclick="openModal('modalSettings')">⚙️</button>
</div>

<div style="display:flex; background:#222">
    <button onclick="switchTab('chat', this)">Chat</button>
    <button onclick="switchTab('prayers', this)">Pedidos</button>
    <button onclick="switchTab('telao', this)">Telão</button>
</div>

<div class="pane active" id="pane-chat">
    <div id="chatMessages" style="flex:1; overflow-y:auto;"></div>
    <div style="padding:5px;">
        <input id="replyInput" style="width:70%" placeholder="Mensagem...">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<div class="pane" id="pane-prayers">
    <div id="prayersList" style="flex:1; overflow-y:auto;"></div>
</div>

<div class="pane" id="pane-telao">
    <button class="btn" onclick="addManual()">+ Pedido Manual</button>
    <div id="telaoArea" style="flex:1;"></div>
    <button class="btn" onclick="exportImage()">📷 Exportar Pedido de Oração.jpg</button>
</div>

<div id="modalSettings" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);">
    <div style="background:#1a1a2e; padding:20px; margin:20px;">
        <h3>Configurações</h3>
        <input id="cfgHandle" placeholder="Handle"><br>
        <input id="cfgYtKey" placeholder="API Key"><br>
        <input id="cfgClientId" placeholder="Client ID"><br>
        <input id="cfgGeminiKey" placeholder="Gemini Key"><br>
        <label>Detecção IA Intervalo (s):</label>
        <input id="cfgInterval" type="number" value="30">
        <button onclick="saveSettings()">Salvar</button>
    </div>
</div>

<script>
    // --- Funções principais ---
    function openLives() {
        // Lógica de buscar lives...
        // Ao selecionar live, chame:
        // 1. connectToLive(videoId);
        // 2. if(!accessToken) oauthClient.requestAccessToken();
    }

    function saveSettings() {
        localStorage.setItem('handle', document.getElementById('cfgHandle').value);
        localStorage.setItem('ytKey', document.getElementById('cfgYtKey').value);
        localStorage.setItem('clientId', document.getElementById('cfgClientId').value);
        localStorage.setItem('geminiKey', document.getElementById('cfgGeminiKey').value);
        localStorage.setItem('interval', document.getElementById('cfgInterval').value);
        alert('Salvo!');
    }

    function addManual() {
        const nome = prompt("Nome:");
        const motivo = prompt("Motivo:");
        if(nome) {
            // Adicionar à lista de orações
            renderPrayers();
        }
    }

    function exportImage() {
        html2canvas(document.getElementById('telaoArea')).then(canvas => {
            const a = document.createElement('a');
            a.download = "Pedido de Oração.jpg";
            a.href = canvas.toDataURL();
            a.click();
        });
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        document.getElementById('pane-' + id).classList.add('active');
    }
</script>
</body>
</html>
