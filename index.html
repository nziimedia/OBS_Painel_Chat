<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Oração — AD Nazaré II</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');

:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: rgba(201,168,76,0.15);
  --deep: #0d0d18; --panel: #13131f; --card: #1a1a2e; --card2: #1f1f35;
  --border: rgba(201,168,76,0.2); --border2: rgba(255,255,255,0.06);
  --text: #e8e0d0; --muted: #6e6a60; --muted2: #9a9080; --success: #5cb88a; --danger: #e05a5a; --blue: #4a8fd4;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--deep); color: var(--text); font-family: 'Source Sans 3', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── UI ORIGINAL MANTIDA ── */
.topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
.topbar-logo { font-family:'Cinzel',serif; font-size:14px; color:var(--gold); }
.btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-weight: 700; background: var(--gold); color: #0d0d18; }
.tabs { display:flex; gap:2px; padding:0 16px; background:var(--panel); border-bottom:1px solid var(--border); }
.tab { padding:9px 18px; font-size:13px; font-weight:600; color:var(--muted2); cursor:pointer; }
.tab.active { color:var(--gold); border-bottom:2px solid var(--gold); }

/* ── CHAT COM NOME EM CIMA ── */
.chat-msg { padding:7px 9px; border-radius:7px; background:var(--card); margin-bottom: 5px; }
.msg-author { font-size:12px; font-weight:700; color:var(--gold); display:block; margin-bottom: 2px; }
.msg-text { font-size:13px; color:var(--text); }

/* ── TELÃO AJUSTADO ── */
.telao-card { background: #000; padding: 40px; color: #fff; width: 100%; aspect-ratio: 16/9; }
.telao-church { font-family:'Cinzel',serif; font-size: 24px; color: var(--gold); text-align: center; }
.telao-heading { font-family:'Cinzel',serif; font-size: 32px; color: var(--gold-light); text-align: center; margin: 20px 0; }
.telao-item-name { font-family:'Cinzel',serif; font-size: 28px; font-weight: bold; }
.telao-item-reason { font-size: 24px; text-transform: uppercase; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">✝ AD Nazaré II</div>
    <button class="btn" onclick="openModal('modalSettings')">⚙ Configurações</button>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('chat',this)">💬 Chat</div>
    <div class="tab" onclick="switchTab('telao',this)">📺 Telão</div>
</div>

<div class="body">
    <div class="pane active" id="pane-chat">
        <div id="chatMessages" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="reply-bar"><input id="replyInput" class="reply-input"><button class="btn" onclick="sendMessage()">Enviar</button></div>
    </div>

    <div class="pane" id="pane-telao">
        <div style="padding:10px;">
            <button class="btn" onclick="addManual()">+ Pedido Manual</button>
        </div>
        <div id="telaoCard" class="telao-card">
            <div class="telao-church">AD NAZARÉ II | SETOR 31</div>
            <div class="telao-heading">PEDIDOS DE ORAÇÃO</div>
            <div id="telaoNames"></div>
        </div>
        <button class="btn" onclick="exportImageFinal()">📷 Exportar Pedido de Oração.jpg</button>
    </div>
</div>

<script>
function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('pane-' + id).classList.add('active');
}

function addFromChat(msgId, author, text) {
    // Adiciona e pula para o Telão
    addPrayer(author, text);
    switchTab('telao', document.querySelectorAll('.tab')[1]);
}

function addManual() {
    const n = prompt("Nome:");
    const r = prompt("Motivo:");
    if(n) addPrayer(n, r);
}

function addPrayer(nome, motivo) {
    prayers.unshift({ id: Date.now(), nome, motivo, telao: true });
    renderTelaoPreview();
}

function exportImageFinal() {
    const card = document.getElementById('telaoCard');
    html2canvas(card).then(canvas => {
        const link = document.createElement('a');
        link.download = "Pedido de Oração.jpg";
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();
    });
}

// ... (Mantenha o restante das suas funções de monitoramento e render aqui)
</script>
</body>
</html>
