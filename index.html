<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PAINEL NAZARÉ ONLINE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* --- MANTENDO SEU CSS ORIGINAL COM AJUSTES DE TAMANHO --- */
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');
:root { --gold: #c9a84c; --gold-light: #e8c97a; --deep: #0d0d18; --panel: #13131f; --text: #e8e0d0; --border: rgba(201,168,76,0.2); }
body { background: var(--deep); color: var(--text); font-family: 'Source Sans 3', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: var(--panel); border-bottom: 1px solid var(--border); }
.btn { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: 700; background: var(--gold); color: #000; font-size: 11px; }
.pane { display: none; flex: 1; overflow: hidden; }
.pane.active { display: flex; flex-direction: column; }
/* Telão Ajustado */
.telao-card { width: 100%; aspect-ratio: 16/9; background: #000; padding: 40px; display: flex; flex-direction: column; }
.telao-church { font-family:'Cinzel',serif; font-size: 18px; color: var(--gold); letter-spacing: 4px; text-align: center; }
.telao-heading { font-family:'Cinzel',serif; font-size: 22px; color: var(--gold); text-align: center; margin: 20px 0; }
.telao-item-name { font-family:'Cinzel',serif; font-size: 28px; color: var(--gold-light); font-weight: 600; }
.telao-item-reason { font-size: 20px; color: #fff; margin-bottom: 15px; }
.modal-input { width: 100%; padding: 8px; margin: 5px 0; background: #13131f; border: 1px solid var(--border); color: #fff; }
</style>
</head>
<body>

<div class="topbar">
    <button class="btn" onclick="openLives()">🔴 Buscar/Conectar</button>
    <button class="btn" onclick="openModal('modalSettings')">⚙️ Configs</button>
</div>

<div style="display:flex; background:#13131f; border-bottom:1px solid var(--border)">
    <button class="btn" onclick="switchTab('chat', this)">💬 Chat</button>
    <button class="btn" onclick="switchTab('prayers', this)">🙏 Pedidos</button>
    <button class="btn" onclick="switchTab('telao', this)">📺 Telão</button>
</div>

<div id="modalSettings" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:99;">
    <div style="background:#1a1a2e; padding:20px; margin:50px; border-radius:10px;">
        <h3>Configurações</h3>
        <input class="modal-input" id="cfgHandle" placeholder="Handle">
        <input class="modal-input" id="cfgYtKey" placeholder="YouTube API Key">
        <input class="modal-input" id="cfgClientId" placeholder="Client ID">
        <input class="modal-input" id="cfgGeminiKey" placeholder="Gemini Key">
        <label>Palavras-chave IA:</label>
        <input class="modal-input" id="keywords" value="oração,ore por,pedido de oração">
        <label>Intervalo IA (seg):</label>
        <input class="modal-input" id="interval" type="number" value="30">
        <button class="btn" onclick="saveSettings()">Salvar</button>
        <button class="btn" onclick="closeModal('modalSettings')">Fechar</button>
    </div>
</div>

<div id="pane-chat" class="pane active">
    <div id="chatMessages" style="flex:1; overflow-y:auto; padding:10px;"></div>
    <div style="padding:10px;"><input id="replyInput" style="width:70%"><button onclick="sendMessage()">Enviar</button></div>
</div>

<div id="pane-prayers" class="pane">
    <div id="prayersList" style="flex:1; overflow-y:auto;"></div>
</div>

<div id="pane-telao" class="pane">
    <button class="btn" onclick="addManual()">+ Adicionar Pedido Manual</button>
    <div id="telaoCard" class="telao-card">
        <div class="telao-church">AD NAZARÉ II | SETOR 31</div>
        <div class="telao-heading">PEDIDOS DE ORAÇÃO</div>
        <div id="telaoNames"></div>
    </div>
    <button class="btn" onclick="exportImage()">📷 Exportar Pedido de Oração.jpg</button>
</div>

<script>
    // Funções de salvamento atualizadas
    function saveSettings() {
        localStorage.setItem('handle', document.getElementById('cfgHandle').value);
        localStorage.setItem('keywords', document.getElementById('keywords').value);
        localStorage.setItem('interval', document.getElementById('interval').value);
        alert('Configurações salvas!');
        closeModal('modalSettings');
    }

    function addManual() {
        const nome = prompt("Nome:");
        const motivo = prompt("Motivo:");
        if(nome) { 
            /* Sua lógica original de addPrayer */
            alert("Pedido adicionado!");
        }
    }

    function exportImage() {
        html2canvas(document.getElementById('telaoCard')).then(canvas => {
            const a = document.createElement('a');
            a.download = "Pedido de Oração.jpg";
            a.href = canvas.toDataURL('image/jpeg', 0.92);
            a.click();
        });
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        document.getElementById('pane-' + id).classList.add('active');
    }
    
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openLives() { /* Sua lógica original */ }
</script>
</body>
</html>
