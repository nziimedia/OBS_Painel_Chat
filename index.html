<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PAINEL NAZARÉ ONLINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* MANTENDO O SEU DESIGN ORIGINAL */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Source+Sans+3:wght@300;400;700&display=swap');
        :root { --gold: #c9a84c; --gold-light: #e8c97a; --deep: #0d0d18; --panel: #13131f; --text: #e8e0d0; --border: rgba(201,168,76,0.2); }
        body { background: var(--deep); color: var(--text); font-family: 'Source Sans 3', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { display: flex; align-items: center; gap: 5px; padding: 5px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 11px; }
        .btn { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: 700; background: var(--gold); color: #000; }
        .pane { display: none; flex: 1; overflow: hidden; padding: 10px; }
        .pane.active { display: flex; flex-direction: column; }
        /* Ajuste fino para compactar */
        .chat-msg { padding: 3px 5px; font-size: 11px; border-bottom: 1px solid #222; }
        .msg-author { font-weight: 700; color: var(--gold); display: block; }
        .prayer-card { background: #1a1a2e; padding: 8px; margin-bottom: 5px; border-radius: 5px; }
        /* Telão Aumentado */
        .telao-card { background: #000; padding: 30px; font-family: 'Cinzel', serif; width: 100%; }
        .telao-title { font-size: 32px; color: var(--gold); text-align: center; }
        .telao-sub { font-size: 24px; color: #aaa; text-align: center; }
    </style>
</head>
<body>

<div class="topbar">
    <button class="btn" onclick="openLives()">🔴 Buscar/Conectar</button>
    <button class="btn" onclick="openModal('modalSettings')">⚙️ Configs</button>
</div>

<div style="display:flex; background:#13131f; border-bottom:1px solid var(--border)">
    <button onclick="switchTab('chat', this)">💬 Chat</button>
    <button onclick="switchTab('prayers', this)">🙏 Pedidos</button>
    <button onclick="switchTab('telao', this)">📺 Telão</button>
</div>

<div id="pane-chat" class="pane active">...</div>
<div id="pane-prayers" class="pane">...</div>
<div id="pane-telao" class="pane">
    <button class="btn" onclick="addManual()">+ Adicionar Pedido Manual</button>
    <div id="telaoPreview">...</div>
    <button class="btn" onclick="exportImage()">📷 Exportar Pedido de Oração.jpg</button>
</div>

<script>
    // Mantendo todas as suas funções de conexão, IA e Render que já funcionavam
    function addManual() {
        const nome = prompt("Nome da pessoa:");
        const motivo = prompt("Motivo:");
        if(nome) { /* sua lógica original de adicionar */ }
    }
    
    function exportImage() {
        html2canvas(document.getElementById('telaoCard')).then(canvas => {
            const a = document.createElement('a');
            a.download = "Pedido de Oração.jpg";
            a.href = canvas.toDataURL();
            a.click();
        });
    }
</script>
</body>
</html>
